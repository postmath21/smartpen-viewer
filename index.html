<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Pen 3D Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: white; }

    #canvas-wrap {
      position: fixed;
      inset: 0;
    }

    canvas { display: block; width: 100% !important; height: 100% !important; }

    /* Loading */
    #loading {
      position: fixed; inset: 0;
      background: #111;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 50;
    }
    .spin {
      width: 40px; height: 40px;
      border: 2px solid #222; border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #load-bar-wrap { width: 200px; height: 2px; background: #222; border-radius: 2px; margin-bottom: 10px; }
    #load-bar { height: 100%; background: white; border-radius: 2px; width: 0%; transition: width 0.2s; }
    #load-text { font-size: 11px; opacity: 0.4; letter-spacing: 2px; }

    /* UI Panel */
    #ui {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center;
      z-index: 10;
    }
    .btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      padding: 9px 16px; border-radius: 7px;
      font-size: 11px; cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
      backdrop-filter: blur(10px);
    }
    .btn:hover { background: rgba(255,255,255,0.15); }
    #render-btn {
      background: white; color: #111;
      font-weight: 700; padding: 9px 26px;
      border-radius: 7px; font-size: 11px;
      cursor: pointer; border: none;
      letter-spacing: 3px;
      transition: opacity 0.15s, transform 0.1s;
    }
    #render-btn:hover { opacity: 0.87; }
    #render-btn:active { transform: scale(0.97); }

    /* Top info */
    #top-ui {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center;
      z-index: 10;
    }
    #title {
      font-size: 11px; letter-spacing: 5px;
      text-transform: uppercase; opacity: 0.35;
    }

    /* BG */
    #bg-wrap {
      position: fixed; top: 24px; right: 24px;
      display: flex; gap: 7px; align-items: center;
      z-index: 10;
    }
    #bg-wrap span { font-size: 9px; opacity: 0.3; letter-spacing: 2px; text-transform: uppercase; margin-right: 3px; }
    .bdot {
      width: 18px; height: 18px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
    }
    .bdot:hover { transform: scale(1.2); }
    .bdot.on { border-color: white; }

    /* Hint */
    #hint {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px; opacity: 0;
      letter-spacing: 2px; color: rgba(255,255,255,0.35);
      transition: opacity 0.5s;
      pointer-events: none; white-space: nowrap;
    }
    #hint.show { opacity: 1; }

    /* Flash / notice */
    #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 100; transition: opacity 0.08s; }
    #notice {
      position: fixed; bottom: 90px; right: 24px;
      background: white; color: #111;
      padding: 8px 18px; border-radius: 30px;
      font-size: 11px; font-weight: 700;
      opacity: 0; transition: opacity 0.3s; z-index: 200;
    }
    #notice.on { opacity: 1; }

    /* View presets */
    #presets {
      position: fixed; left: 24px; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 6px;
      z-index: 10;
    }
    .preset-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      padding: 6px 10px; border-radius: 5px;
      font-size: 9px; cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, color 0.15s;
      backdrop-filter: blur(10px);
      text-align: center;
    }
    .preset-btn:hover { background: rgba(255,255,255,0.15); color: white; }
  </style>
</head>
<body>

<div id="canvas-wrap"></div>

<div id="loading">
  <div class="spin"></div>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
  <div id="load-text">모델 로딩중...</div>
</div>

<div id="top-ui">
  <div id="title">Smart Pen · 3D Viewer</div>
</div>

<div id="bg-wrap">
  <span>BG</span>
  <div class="bdot on" style="background:#111" data-color="#111" data-fog="0x111111"></div>
  <div class="bdot" style="background:#ffffff;border-color:#333" data-color="#fff" data-fog="0xffffff"></div>
  <div class="bdot" style="background:#1a1a2e" data-color="#1a1a2e" data-fog="0x1a1a2e"></div>
  <div class="bdot" style="background:#f0f0f0;border-color:#333" data-color="#f0f0f0" data-fog="0xf0f0f0"></div>
</div>

<!-- View presets -->
<div id="presets">
  <div class="preset-btn" data-view="front">정면</div>
  <div class="preset-btn" data-view="back">뒷면</div>
  <div class="preset-btn" data-view="left">좌측</div>
  <div class="preset-btn" data-view="right">우측</div>
  <div class="preset-btn" data-view="top">탑</div>
  <div class="preset-btn" data-view="bottom">바텀</div>
  <div class="preset-btn" data-view="iso">아이소</div>
</div>

<div id="hint">드래그: 회전 &nbsp;|&nbsp; 스크롤: 줌 &nbsp;|&nbsp; 우클릭: 이동</div>

<div id="ui">
  <button class="btn" id="reset-btn">↺ 리셋</button>
  <button class="btn" id="wire-btn">◻ 와이어프레임</button>
  <button id="render-btn">⬇ RENDER</button>
</div>

<div id="flash"></div>
<div id="notice">✅ 저장됨</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
// ── Three.js 세팅 ───────────────────────────────────────
const wrap = document.getElementById('canvas-wrap');

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  preserveDrawingBuffer: true  // RENDER 버튼용
});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(0, 0, 3);

// ── 조명 ────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight1.position.set(5, 10, 5);
dirLight1.castShadow = true;
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight2.position.set(-5, -5, -5);
scene.add(dirLight2);

const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
fillLight.position.set(0, 5, -10);
scene.add(fillLight);

// ── OrbitControls (인라인 구현) ──────────────────────────
let isDragging = false, isRightDrag = false;
let prevX = 0, prevY = 0;
let spherical = { theta: 0.3, phi: Math.PI / 2.5, radius: 3 };
let targetSpherical = { ...spherical };
let pan = { x: 0, y: 0 };
let targetPan = { x: 0, y: 0 };

function updateCamera() {
  // Smooth interpolation
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.12;
  spherical.phi   += (targetSpherical.phi   - spherical.phi)   * 0.12;
  spherical.radius+= (targetSpherical.radius- spherical.radius)* 0.12;
  pan.x += (targetPan.x - pan.x) * 0.12;
  pan.y += (targetPan.y - pan.y) * 0.12;

  const x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  const y = spherical.radius * Math.cos(spherical.phi);
  const z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);

  camera.position.set(x + pan.x, y + pan.y, z);
  camera.lookAt(pan.x, pan.y, 0);
}

const canvas = renderer.domElement;

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  isRightDrag = e.button === 2;
  prevX = e.clientX; prevY = e.clientY;
});
canvas.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevX;
  const dy = e.clientY - prevY;
  prevX = e.clientX; prevY = e.clientY;

  if (isRightDrag) {
    // Pan
    const panSpeed = 0.002 * spherical.radius;
    targetPan.x -= dx * panSpeed;
    targetPan.y += dy * panSpeed;
  } else {
    // Orbit
    targetSpherical.theta -= dx * 0.008;
    targetSpherical.phi   -= dy * 0.008;
    targetSpherical.phi = Math.max(0.05, Math.min(Math.PI - 0.05, targetSpherical.phi));
  }
});
window.addEventListener('mouseup', () => isDragging = false);

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  targetSpherical.radius *= (1 + e.deltaY * 0.001);
  targetSpherical.radius = Math.max(0.3, Math.min(20, targetSpherical.radius));
}, { passive: false });

// Touch
let touches = [];
canvas.addEventListener('touchstart', e => { touches = [...e.touches]; }, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - touches[0].clientX;
    const dy = e.touches[0].clientY - touches[0].clientY;
    targetSpherical.theta -= dx * 0.008;
    targetSpherical.phi   -= dy * 0.008;
    targetSpherical.phi = Math.max(0.05, Math.min(Math.PI - 0.05, targetSpherical.phi));
  } else if (e.touches.length === 2) {
    const prevDist = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
    const newDist  = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    targetSpherical.radius *= prevDist / newDist;
    targetSpherical.radius = Math.max(0.3, Math.min(20, targetSpherical.radius));
  }
  touches = [...e.touches];
}, { passive: true });

// ── GLB 로드 ─────────────────────────────────────────────
const dracoLoader = new THREE.DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
const gltfLoader = new THREE.GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);
gltfLoader.load(
  'smartpen.glb',
  (gltf) => {
    const model = gltf.scene;

    // 모델 크기 정규화
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 2.0 / maxDim;
    model.scale.setScalar(scale);
    model.position.sub(center.multiplyScalar(scale));

    // 방향 보정 (KeyShot GLB는 Z축이 위로 나옴 → Y축으로 보정)
    model.rotation.x = -Math.PI / 2;

    scene.add(model);
    window._model = model;

    // 카메라 거리 조정
    targetSpherical.radius = 2.5;
    spherical.radius = 2.5;

    document.getElementById('loading').style.display = 'none';

    // 힌트 표시
    const hint = document.getElementById('hint');
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), 3000);
  },
  (progress) => {
    if (progress.total > 0) {
      const pct = (progress.loaded / progress.total * 100);
      document.getElementById('load-bar').style.width = pct + '%';
      document.getElementById('load-text').textContent = `로딩중 ${Math.round(pct)}%`;
    }
  },
  (err) => {
    document.getElementById('load-text').textContent = '로드 실패: ' + err.message;
    console.error(err);
  }
);

// ── 뷰 프리셋 ─────────────────────────────────────────────
const VIEWS = {
  front:  { theta: 0,         phi: Math.PI/2,    r: 2.5 },
  back:   { theta: Math.PI,   phi: Math.PI/2,    r: 2.5 },
  left:   { theta: -Math.PI/2,phi: Math.PI/2,    r: 2.5 },
  right:  { theta: Math.PI/2, phi: Math.PI/2,    r: 2.5 },
  top:    { theta: 0,         phi: 0.05,          r: 2.5 },
  bottom: { theta: 0,         phi: Math.PI-0.05,  r: 2.5 },
  iso:    { theta: Math.PI/4, phi: Math.PI/3,    r: 3.0 },
};

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = VIEWS[btn.dataset.view];
    if (!v) return;
    targetSpherical.theta = v.theta;
    targetSpherical.phi   = v.phi;
    targetSpherical.radius = v.r;
    targetPan = { x: 0, y: 0 };
  });
});

// ── 리셋 ─────────────────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click', () => {
  targetSpherical = { theta: 0.3, phi: Math.PI/2.5, radius: 2.5 };
  targetPan = { x: 0, y: 0 };
});

// ── 와이어프레임 토글 ──────────────────────────────────────
let wireframe = false;
document.getElementById('wire-btn').addEventListener('click', () => {
  wireframe = !wireframe;
  if (window._model) {
    window._model.traverse(child => {
      if (child.isMesh && child.material) {
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(m => m.wireframe = wireframe);
      }
    });
  }
  document.getElementById('wire-btn').textContent = wireframe ? '● 솔리드' : '◻ 와이어프레임';
});

// ── RENDER 버튼 ───────────────────────────────────────────
document.getElementById('render-btn').addEventListener('click', () => {
  renderer.render(scene, camera);
  const dataURL = renderer.domElement.toDataURL('image/png');

  const fl = document.getElementById('flash');
  fl.style.opacity = '0.7';
  setTimeout(() => fl.style.opacity = '0', 120);

  const a = document.createElement('a');
  a.href = dataURL;
  const ts = new Date().toISOString().replace(/[:.]/g,'').slice(0,15);
  a.download = `smartpen_render_${ts}.png`;
  a.click();

  const n = document.getElementById('notice');
  n.classList.add('on');
  setTimeout(() => n.classList.remove('on'), 2000);
});

// ── 배경색 ────────────────────────────────────────────────
document.querySelectorAll('.bdot').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.bdot').forEach(d => d.classList.remove('on'));
    dot.classList.add('on');
    const color = dot.dataset.color;
    scene.background = new THREE.Color(color);
    document.body.style.background = color;
  });
});

// ── Resize ───────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── 렌더 루프 ─────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  updateCamera();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>

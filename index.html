<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Pen 3D Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: white; }

    #canvas-wrap { position: fixed; inset: 0; }
    canvas { display: block; width: 100% !important; height: 100% !important; }

    /* Loading */
    #loading {
      position: fixed; inset: 0; background: #111;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 50;
    }
    .spin {
      width: 40px; height: 40px;
      border: 2px solid #222; border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #load-bar-wrap { width: 200px; height: 2px; background: #222; border-radius: 2px; margin-bottom: 10px; }
    #load-bar { height: 100%; background: white; border-radius: 2px; width: 0%; transition: width 0.2s; }
    #load-text { font-size: 11px; opacity: 0.4; letter-spacing: 2px; }

    /* UI Panel */
    #ui {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center; z-index: 10;
    }
    .btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      padding: 9px 16px; border-radius: 7px;
      font-size: 11px; cursor: pointer; letter-spacing: 1px;
      transition: background 0.15s; backdrop-filter: blur(10px);
    }
    .btn:hover { background: rgba(255,255,255,0.15); }

    #render-btn {
      background: white; color: #111;
      font-weight: 700; padding: 9px 26px;
      border-radius: 7px; font-size: 11px;
      cursor: pointer; border: none; letter-spacing: 3px;
      transition: opacity 0.15s, transform 0.1s, background 0.3s, color 0.3s;
      display: flex; align-items: center; gap: 8px;
    }
    #render-btn:hover { opacity: 0.87; }
    #render-btn:active { transform: scale(0.97); }
    #render-btn.blender-ready {
      background: linear-gradient(135deg, #1e3a5f, #3b1f6b);
      color: white;
      box-shadow: 0 0 14px rgba(100,140,255,0.3);
    }
    #render-btn.rendering {
      background: linear-gradient(135deg, #1e3a5f, #3b1f6b);
      color: rgba(255,255,255,0.6);
      cursor: not-allowed;
      animation: pulse-btn 1.5s ease-in-out infinite;
    }
    @keyframes pulse-btn { 0%,100%{opacity:1} 50%{opacity:0.65} }
    .render-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: transparent; transition: all 0.3s; flex-shrink: 0;
    }
    #render-btn.blender-ready .render-dot {
      background: #4ade80; box-shadow: 0 0 6px #4ade80;
    }
    #render-btn.rendering .render-dot {
      background: #facc15; box-shadow: 0 0 6px #facc15;
      animation: blink 0.7s linear infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    #top-ui {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center; z-index: 10;
    }
    #title { font-size: 11px; letter-spacing: 5px; text-transform: uppercase; opacity: 0.35; }

    #bg-wrap {
      position: fixed; top: 24px; right: 24px;
      display: flex; gap: 7px; align-items: center; z-index: 10;
    }
    #bg-wrap span { font-size: 9px; opacity: 0.3; letter-spacing: 2px; text-transform: uppercase; margin-right: 3px; }
    .bdot {
      width: 18px; height: 18px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
    }
    .bdot:hover { transform: scale(1.2); }
    .bdot.on { border-color: white; }

    #hint {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px; opacity: 0; letter-spacing: 2px;
      color: rgba(255,255,255,0.35); transition: opacity 0.5s;
      pointer-events: none; white-space: nowrap;
    }
    #hint.show { opacity: 1; }

    #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 100; transition: opacity 0.08s; }
    #notice {
      position: fixed; bottom: 90px; right: 24px;
      background: white; color: #111;
      padding: 8px 18px; border-radius: 30px;
      font-size: 11px; font-weight: 700;
      opacity: 0; transition: opacity 0.3s; z-index: 200;
    }
    #notice.on { opacity: 1; }

    #render-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 300; backdrop-filter: blur(8px);
    }
    #render-overlay.show { display: flex; }
    .ov-title { font-size: 13px; letter-spacing: 5px; font-weight: 600; margin-bottom: 28px; }
    .ov-bar-wrap { width: 260px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
    .ov-bar { height: 100%; background: linear-gradient(90deg,#60a5fa,#a78bfa); border-radius: 2px; width: 0%; transition: width 0.4s ease; }
    .ov-sub { font-size: 10px; opacity: 0.35; letter-spacing: 2px; }

    #result-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 400; backdrop-filter: blur(10px);
    }
    #result-overlay.show { display: flex; }
    #result-img { max-width: 82vw; max-height: 72vh; border-radius: 8px; box-shadow: 0 24px 80px rgba(0,0,0,0.9); }
    .res-actions { display: flex; gap: 12px; margin-top: 22px; }
    .res-btn {
      padding: 10px 28px; border-radius: 7px; font-size: 11px;
      letter-spacing: 2px; cursor: pointer; font-weight: 600; transition: opacity 0.15s;
    }
    .res-btn:hover { opacity: 0.85; }
    #res-dl    { background: white; color: #111; border: none; }
    #res-close { background: transparent; color: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.2); }

    #presets {
      position: fixed; left: 24px; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 6px; z-index: 10;
    }
    .preset-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      padding: 6px 10px; border-radius: 5px;
      font-size: 9px; cursor: pointer; letter-spacing: 1px;
      transition: background 0.15s, color 0.15s;
      backdrop-filter: blur(10px); text-align: center;
    }
    .preset-btn:hover { background: rgba(255,255,255,0.15); color: white; }
  </style>
</head>
<body>

<div id="canvas-wrap"></div>

<div id="loading">
  <div class="spin"></div>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
  <div id="load-text">모델 로딩중...</div>
</div>

<div id="top-ui">
  <div id="title">Smart Pen · 3D Viewer</div>
</div>

<div id="bg-wrap">
  <span>BG</span>
  <div class="bdot on" style="background:#111" data-color="#111"></div>
  <div class="bdot" style="background:#ffffff;border-color:#333" data-color="#fff"></div>
  <div class="bdot" style="background:#1a1a2e" data-color="#1a1a2e"></div>
  <div class="bdot" style="background:#f0f0f0;border-color:#333" data-color="#f0f0f0"></div>
</div>

<div id="presets">
  <div class="preset-btn" data-view="front">정면</div>
  <div class="preset-btn" data-view="back">뒷면</div>
  <div class="preset-btn" data-view="left">좌측</div>
  <div class="preset-btn" data-view="right">우측</div>
  <div class="preset-btn" data-view="top">탑</div>
  <div class="preset-btn" data-view="bottom">바텀</div>
  <div class="preset-btn" data-view="iso">아이소</div>
</div>

<div id="hint">드래그: 회전 &nbsp;|&nbsp; 스크롤: 줌 &nbsp;|&nbsp; 우클릭: 이동</div>

<div id="ui">
  <button class="btn" id="reset-btn">↺ 리셋</button>
  <button class="btn" id="wire-btn">◻ 와이어프레임</button>
  <button id="render-btn"><span class="render-dot"></span>RENDER</button>
</div>

<div id="flash"></div>
<div id="notice">✅ 저장됨</div>

<div id="render-overlay">
  <div class="ov-title">BLENDER RENDERING</div>
  <div class="ov-bar-wrap"><div class="ov-bar" id="ov-bar"></div></div>
  <div class="ov-sub" id="ov-sub">Cycles 256 samples · 2500×1707</div>
</div>

<div id="result-overlay">
  <img id="result-img" src="" alt="Render Result">
  <div class="res-actions">
    <button class="res-btn" id="res-dl">⬇ 다운로드</button>
    <button class="res-btn" id="res-close">✕ 닫기</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
const wrap = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.shadowMap.enabled = true;
wrap.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(0, 0, 3);

function createStudioEnvMap() {
  const W = 512, H = 256;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#e2e3e7';
  ctx.fillRect(0, 0, W, H);
  const g1 = ctx.createRadialGradient(80, 55, 0, 80, 55, 220);
  g1.addColorStop(0, 'rgba(255,255,255,1.0)');
  g1.addColorStop(0.4,'rgba(250,251,255,0.7)');
  g1.addColorStop(1, 'rgba(226,227,231,0)');
  ctx.fillStyle = g1; ctx.fillRect(0, 0, W, H);
  const g2 = ctx.createRadialGradient(430, 130, 0, 430, 130, 160);
  g2.addColorStop(0, 'rgba(240,243,250,0.75)');
  g2.addColorStop(1, 'rgba(226,227,231,0)');
  ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);
  const g3 = ctx.createRadialGradient(256, 15, 0, 256, 15, 110);
  g3.addColorStop(0, 'rgba(255,255,255,0.65)');
  g3.addColorStop(1, 'rgba(226,227,231,0)');
  ctx.fillStyle = g3; ctx.fillRect(0, 0, W, H);
  const g4 = ctx.createLinearGradient(0, H*0.65, 0, H);
  g4.addColorStop(0, 'rgba(226,227,231,0)');
  g4.addColorStop(1, 'rgba(210,212,218,0.3)');
  ctx.fillStyle = g4; ctx.fillRect(0, 0, W, H);
  const tex = new THREE.CanvasTexture(cv);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  const envMap = pmrem.fromEquirectangular(tex).texture;
  tex.dispose(); pmrem.dispose();
  return envMap;
}

const studioEnvMap = createStudioEnvMap();
scene.environment = studioEnvMap;

scene.add(new THREE.AmbientLight(0xffffff, 0.15));
const dl1 = new THREE.DirectionalLight(0xffffff, 0.8); dl1.position.set(5,10,5); dl1.castShadow=true; scene.add(dl1);
const dl2 = new THREE.DirectionalLight(0xffffff, 0.3); dl2.position.set(-5,-5,-5); scene.add(dl2);
const dl3 = new THREE.DirectionalLight(0xffffff, 0.15); dl3.position.set(0,5,-10); scene.add(dl3);

let isDragging=false, isRightDrag=false, prevX=0, prevY=0;
let spherical      = { theta:0.3, phi:Math.PI/2.5, radius:3 };
let targetSpherical = { ...spherical };
let pan = {x:0,y:0}, targetPan = {x:0,y:0};

function updateCamera() {
  spherical.theta  += (targetSpherical.theta  - spherical.theta)  * 0.12;
  spherical.phi    += (targetSpherical.phi    - spherical.phi)    * 0.12;
  spherical.radius += (targetSpherical.radius - spherical.radius) * 0.12;
  pan.x += (targetPan.x - pan.x) * 0.12;
  pan.y += (targetPan.y - pan.y) * 0.12;
  const x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  const y = spherical.radius * Math.cos(spherical.phi);
  const z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.set(x+pan.x, y+pan.y, z);
  camera.lookAt(pan.x, pan.y, 0);
}

const canvas = renderer.domElement;
canvas.addEventListener('mousedown', e => { isDragging=true; isRightDrag=e.button===2; prevX=e.clientX; prevY=e.clientY; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx=e.clientX-prevX, dy=e.clientY-prevY; prevX=e.clientX; prevY=e.clientY;
  if (isRightDrag) {
    const sp=0.002*spherical.radius; targetPan.x-=dx*sp; targetPan.y+=dy*sp;
  } else {
    targetSpherical.theta-=dx*0.008; targetSpherical.phi-=dy*0.008;
    targetSpherical.phi=Math.max(0.05,Math.min(Math.PI-0.05,targetSpherical.phi));
  }
});
window.addEventListener('mouseup', () => isDragging=false);
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  targetSpherical.radius*=(1+e.deltaY*0.001);
  targetSpherical.radius=Math.max(0.3,Math.min(20,targetSpherical.radius));
}, {passive:false});

let touches=[];
canvas.addEventListener('touchstart', e=>{touches=[...e.touches];},{passive:true});
canvas.addEventListener('touchmove', e=>{
  if(e.touches.length===1){
    const dx=e.touches[0].clientX-touches[0].clientX, dy=e.touches[0].clientY-touches[0].clientY;
    targetSpherical.theta-=dx*0.008; targetSpherical.phi-=dy*0.008;
    targetSpherical.phi=Math.max(0.05,Math.min(Math.PI-0.05,targetSpherical.phi));
  } else if(e.touches.length===2){
    const pd=Math.hypot(touches[0].clientX-touches[1].clientX,touches[0].clientY-touches[1].clientY);
    const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    targetSpherical.radius*=pd/nd; targetSpherical.radius=Math.max(0.3,Math.min(20,targetSpherical.radius));
  }
  touches=[...e.touches];
},{passive:true});

const dracoLoader = new THREE.DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
const gltfLoader = new THREE.GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);
gltfLoader.load('smartpen.glb',
  gltf => {
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const scale = 2.0 / Math.max(size.x, size.y, size.z);
    model.scale.setScalar(scale);
    model.position.sub(center.multiplyScalar(scale));
    model.rotation.x = -Math.PI / 2;
    scene.add(model);
    window._model = model;
    targetSpherical.radius = spherical.radius = 2.5;
    document.getElementById('loading').style.display = 'none';
    const hint = document.getElementById('hint');
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), 3000);
  },
  p => {
    if (p.total > 0) {
      const pct = p.loaded / p.total * 100;
      document.getElementById('load-bar').style.width = pct + '%';
      document.getElementById('load-text').textContent = `로딩중 ${Math.round(pct)}%`;
    }
  },
  err => { document.getElementById('load-text').textContent = '로드 실패: ' + err.message; }
);

const VIEWS = {
  front:{theta:0,phi:Math.PI/2,r:2.5}, back:{theta:Math.PI,phi:Math.PI/2,r:2.5},
  left:{theta:-Math.PI/2,phi:Math.PI/2,r:2.5}, right:{theta:Math.PI/2,phi:Math.PI/2,r:2.5},
  top:{theta:0,phi:0.05,r:2.5}, bottom:{theta:0,phi:Math.PI-0.05,r:2.5},
  iso:{theta:Math.PI/4,phi:Math.PI/3,r:3.0},
};
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const v=VIEWS[btn.dataset.view]; if(!v) return;
    targetSpherical.theta=v.theta; targetSpherical.phi=v.phi; targetSpherical.radius=v.r;
    targetPan={x:0,y:0};
  });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  targetSpherical={theta:0.3,phi:Math.PI/2.5,radius:2.5}; targetPan={x:0,y:0};
});

let wireframe=false;
document.getElementById('wire-btn').addEventListener('click', () => {
  wireframe=!wireframe;
  if(window._model) window._model.traverse(c=>{
    if(c.isMesh&&c.material){
      const ms=Array.isArray(c.material)?c.material:[c.material];
      ms.forEach(m=>m.wireframe=wireframe);
    }
  });
  document.getElementById('wire-btn').textContent=wireframe?'● 솔리드':'◻ 와이어프레임';
});

document.querySelectorAll('.bdot').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.bdot').forEach(d=>d.classList.remove('on'));
    dot.classList.add('on');
    scene.background=new THREE.Color(dot.dataset.color);
    document.body.style.background=dot.dataset.color;
    scene.environment = studioEnvMap;
  });
});

window.addEventListener('resize', () => {
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

function animate() { requestAnimationFrame(animate); updateCamera(); renderer.render(scene,camera); }
animate();

const SERVER = window.location.hostname.includes('github.io')
  ? 'http://localhost:8888'
  : window.location.origin;

const renderBtn  = document.getElementById('render-btn');
const overlay    = document.getElementById('render-overlay');
const ovBar      = document.getElementById('ov-bar');
const ovSub      = document.getElementById('ov-sub');
const resultOv   = document.getElementById('result-overlay');
const resultImg  = document.getElementById('result-img');

let isRendering   = false;
let barTimer      = null;
let lastResultURL = null;

async function checkServer() {
  try {
    const r = await fetch(SERVER + '/status', { signal: AbortSignal.timeout(2000) });
    const d = await r.json();
    return d.ok && d.blender;
  } catch { return false; }
}

async function updateBtn() {
  if (isRendering) return;
  const ok = await checkServer();
  renderBtn.classList.toggle('blender-ready', ok);
  renderBtn.title = ok
    ? 'Blender 연결됨 — 클릭하면 고품질 렌더링 시작'
    : '클릭하면 현재 화면 캡처 저장 (Blender 서버 미연결)';
}
updateBtn();
setInterval(updateBtn, 5000);

function startBar(sec) {
  let p=0; ovBar.style.width='0%';
  barTimer = setInterval(() => {
    p = Math.min(p + (100/(sec*10)) * (1 - p/110), 92);
    ovBar.style.width = p + '%';
  }, 100);
}
function endBar() { clearInterval(barTimer); ovBar.style.width='100%'; }

function quickCapture() {
  renderer.render(scene, camera);
  const url = renderer.domElement.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = `smartpen_${new Date().toISOString().replace(/[:.]/g,'').slice(0,15)}.png`;
  a.click();
  document.getElementById('flash').style.opacity='0.7';
  setTimeout(()=>document.getElementById('flash').style.opacity='0',120);
  const n=document.getElementById('notice'); n.textContent='✅ 저장됨';
  n.classList.add('on'); setTimeout(()=>n.classList.remove('on'),2000);
}

renderBtn.addEventListener('click', async () => {
  if (isRendering) return;
  const hasServer = await checkServer();
  if (hasServer) {
    isRendering = true;
    renderBtn.classList.remove('blender-ready');
    renderBtn.classList.add('rendering');
    overlay.classList.add('show');
    ovSub.textContent = 'Blender Cycles 렌더링 중… (약 2~5분)';
    startBar(180);
    try {
      const ctrl = new AbortController();
      const tid  = setTimeout(() => ctrl.abort(), 600000);
      const res  = await fetch(SERVER + '/render', { signal: ctrl.signal });
      clearTimeout(tid);
      if (!res.ok) {
        const e = await res.json().catch(()=>({}));
        throw new Error(e.error || '서버 오류');
      }
      const data = await res.json();
      endBar();
      lastResultURL = 'data:image/png;base64,' + data.image;
      resultImg.src = lastResultURL;
      overlay.classList.remove('show');
      resultOv.classList.add('show');
    } catch (e) {
      endBar();
      overlay.classList.remove('show');
      if (e.name === 'AbortError') {
        alert('렌더 시간 초과 (10분). Blender 상태를 확인하세요.');
      } else {
        alert('Blender 렌더 실패: ' + e.message + '\n\n현재 화면으로 저장합니다.');
        quickCapture();
      }
    } finally {
      isRendering = false;
      renderBtn.classList.remove('rendering');
      updateBtn();
    }
  } else {
    quickCapture();
  }
});

document.getElementById('res-dl').addEventListener('click', () => {
  if (!lastResultURL) return;
  const a = document.createElement('a');
  a.href = lastResultURL;
  a.download = `smartpen_blender_${new Date().toISOString().replace(/[:.]/g,'').slice(0,15)}.png`;
  a.click();
});

document.getElementById('res-close').addEventListener('click', () => {
  resultOv.classList.remove('show');
});
</script>
